<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cc0000"/>
      <stop offset="100%" stop-color="#8b0000"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- White badge circle -->
  <circle cx="256" cy="256" r="180" fill="#fff" opacity="0.08"/>
  <circle cx="256" cy="256" r="150" fill="#fff" opacity="0.12"/>
  <!-- Graduation cap (red) -->
  <g transform="translate(256,170)" fill="#fff" opacity="0.95">
    <polygon points="0,-50 -60,-10 -60,20 0,50 60,20 60,-10" fill="none" stroke="#fff" stroke-width="4"/>
    <polygon points="0,-40 -50,-5 -50,15 0,40 50,15 50,-5" fill="#fff"/>
    <rect x="-8" y="40" width="16" height="12" rx="2" fill="#fff"/>
    <line x1="-30" y1="20" x2="0" y2="50" stroke="#fff" stroke-width="3" opacity="0.6"/>
    <line x1="30" y1="20" x2="0" y2="50" stroke="#fff" stroke-width="3" opacity="0.6"/>
  </g>
  <!-- RQ Text (white) -->
  <text x="256" y="330" text-anchor="middle" font-family="Inter,'Segoe UI',Arial,sans-serif" font-size="120" font-weight="900" fill="#fff" letter-spacing="8">RQ</text>
  <!-- Quiz dots (white) -->
  <circle cx="160" cy="380" r="6" fill="#fff" opacity="0.4"/>
  <circle cx="352" cy="380" r="6" fill="#fff" opacity="0.4"/>
  <circle cx="196" cy="400" r="4" fill="#fff" opacity="0.3"/>
  <circle cx="316" cy="400" r="4" fill="#fff" opacity="0.3"/>
  <!-- Subtle border -->
  <rect x="4" y="4" width="504" height="504" rx="92" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
</svg>
