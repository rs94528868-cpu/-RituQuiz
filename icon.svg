<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1440"/>
      <stop offset="100%" stop-color="#0f0c29"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7971e"/>
      <stop offset="100%" stop-color="#ff6b35"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Badge circle -->
  <circle cx="256" cy="256" r="180" fill="url(#badge)" opacity="0.15"/>
  <circle cx="256" cy="256" r="150" fill="url(#badge)" opacity="0.1"/>
  <!-- Graduation cap -->
  <g transform="translate(256,170)" fill="#fff" opacity="0.95">
    <polygon points="0,-50 -60,-10 -60,20 0,50 60,20 60,-10" fill="none" stroke="#fff" stroke-width="4"/>
    <polygon points="0,-40 -50,-5 -50,15 0,40 50,15 50,-5" fill="#fff"/>
    <rect x="-8" y="40" width="16" height="12" rx="2" fill="#fff"/>
    <line x1="-30" y1="20" x2="0" y2="50" stroke="#fff" stroke-width="3" opacity="0.6"/>
    <line x1="30" y1="20" x2="0" y2="50" stroke="#fff" stroke-width="3" opacity="0.6"/>
  </g>
  <!-- RQ Text -->
  <text x="256" y="330" text-anchor="middle" font-family="Inter,'Segoe UI',Arial,sans-serif" font-size="120" font-weight="900" fill="#f7971e" letter-spacing="8">RQ</text>
  <!-- Quiz dots -->
  <circle cx="160" cy="380" r="6" fill="#f7971e" opacity="0.5"/>
  <circle cx="352" cy="380" r="6" fill="#f7971e" opacity="0.5"/>
  <circle cx="196" cy="400" r="4" fill="#ff6b35" opacity="0.4"/>
  <circle cx="316" cy="400" r="4" fill="#ff6b35" opacity="0.4"/>
  <!-- Subtle border -->
  <rect x="4" y="4" width="504" height="504" rx="92" fill="none" stroke="rgba(247,151,30,0.15)" stroke-width="2"/>
</svg>
